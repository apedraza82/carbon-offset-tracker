name: Monthly Carbon Offset Update

on:
  schedule:
    # Run on the 5th of each month at 06:00 UTC
    - cron: '0 6 5 * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download and process new retirements
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.pipeline

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update matched retirements $(date +%Y-%m-%d)"
          git push

      - name: Create release with data files
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: data-${{ github.run_number }}
          name: "Data Update $(date +%Y-%m-%d)"
          files: |
            data/matched_retirements.csv
            data/summary_stats.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
